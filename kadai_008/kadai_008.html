<!DOCTYPE html>
<html>
<head>
  <title>8章課題</title>
  <meta name="description" content="このページは8章の課題です。">
  <meta charset="UTF-8">
</head>
<body>
  <header>
    <h1>SAMURAIニュース</h1>
    <nav>
        <a href="home">ホーム</a>
        <a href="#social">社会</a>
        <a href="#economy">経済</a>
        <a href="#sports">スポーツ</a>
        <a href="#technology">テクノロジー</a>
     </nav>
  </header>
  <main>
    <article>
      <h2>社会</h2>
      <section>
        <h3>和菓子屋も「トリックオアトリート！」</h3>
        <p>日本でも年々人気の高まるハロウィン。
          <br>今年は大手和菓子店5社が
          ハロウィン向けの和菓子セットを共同開発しました。
        </p>
        <audio controls>
          <source src="ichi.mp3" type="audio/mpeg">
        </audio>
      </section>
      <section>
        <h3>私のおすすめ和菓子アンケートフォーム</h3>
        <form>
          <label for="name">氏名:</label>
          <input type="text" id="name-placeholder" 
          placeholder="名前を入力してください"><br><br>

          <label for="age">年齢:</label>
          <select id="age" name="age" required>
            <option value="">選択してください</option>
            <option value="10s">10代</option>
            <option value="20s">20代</option>
            <option value="30s">30代</option>
            <option value="40s">40代</option>
            <option value="50s">50代</option>
            <option value="60s">60代以上</option>
          </select><br><br>

          <label>性別:</label>
          <input type="radio" id="male" name="gender" value="male" required><label for="male">男性</label>
          <input type="radio" id="female" name="gender" value="female"><label for="female">女性</label>
          <input type="radio" id="other" name="gender" value="other"><label for="other">その他</label><br><br>

          <label for="favorite-wagashi">おすすめの和菓子:</label>
          <input type="text" id="favorite-wagashi" name="favorite-wagashi" required><br><br>
          <label for="reason">おすすめの理由:</label>
          <textarea id="reason" name="reason" required></textarea><br><br>

          <label for="questionnaire">個人情報保護方針に同意する</label>
          <input type="checkbox" id="questionnaire" name="questionnaire" required><br><br>

          <input type="submit" value="送信">
          <input type="reset" value="リセット">
        </form>
      </section>
    </article>
    <article>
      <h2>テクノロジー</h2>
      <section>
        <h3>SAMURAIが新しい動画をリリース</h3>
        <P>SAMURAI公式YouTubeで新しい動画がリリースされました。
        <br>動画の内容はHTML/CSSの解説です。</P>
      </section>
    </article>
  </main>
  <footer>
    <p>&copy;SAMURAIニュース</p>
  </footer>
</body>
</html>
